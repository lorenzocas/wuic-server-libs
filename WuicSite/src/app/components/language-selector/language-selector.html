<div class="lang-selector" [class.open]="open()">
  <button type="button" class="lang-trigger"
          (click)="toggle($event)"
          [attr.aria-label]="'Cambia lingua - attuale ' + currentLanguage().label"
          [attr.aria-expanded]="open()"
          aria-haspopup="listbox">
    <span class="fi fi-{{ currentLanguage().flag }} lang-flag" aria-hidden="true"></span>
    <span class="lang-short">{{ currentLanguage().short }}</span>
    <span class="lang-caret" aria-hidden="true">
      <svg viewBox="0 0 12 8" width="10" height="6">
        <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </span>
  </button>

  @if (open()) {
    <ul class="lang-menu" role="listbox" [attr.aria-label]="'Lingue disponibili'">
      @for (lang of languages; track lang.code) {
        <li role="option" [attr.aria-selected]="isActive(lang)">
          <button type="button" class="lang-item"
                  [class.active]="isActive(lang)"
                  (click)="select(lang, $event)">
            <span class="fi fi-{{ lang.flag }} lang-flag" aria-hidden="true"></span>
            <span class="lang-label">{{ lang.label }}</span>
            @if (isActive(lang)) {
              <span class="lang-check" aria-hidden="true">
                <svg viewBox="0 0 16 16" width="14" height="14">
                  <path d="M3 8l3.5 3.5L13 5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </span>
            }
          </button>
        </li>
      }
    </ul>
  }
</div>
