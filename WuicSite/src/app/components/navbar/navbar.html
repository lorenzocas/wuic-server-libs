<nav class="navbar">
  <div class="container navbar-inner">
    <a routerLink="/" class="navbar-brand">
      <i class="pi pi-bolt"></i>
      <span>WUIC</span>
    </a>

    <div class="navbar-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">{{ 'navbar.home' | translate }}</a>
      <a routerLink="/features" routerLinkActive="active">{{ 'navbar.features' | translate }}</a>
      <a routerLink="/pricing" routerLinkActive="active">{{ 'navbar.pricing' | translate }}</a>
      <a routerLink="/comparison" routerLinkActive="active">{{ 'navbar.compare' | translate }}</a>
      <a routerLink="/gallery" routerLinkActive="active">{{ 'navbar.gallery' | translate }}</a>
      <a routerLink="/docs" routerLinkActive="active">{{ 'navbar.docs' | translate }}</a>
      <a routerLink="/downloads" routerLinkActive="active">{{ 'navbar.downloads' | translate }}</a>
      <a href="https://forum.wuic-framework.com" target="_blank">{{ 'navbar.community' | translate }}</a>
    </div>

    <div class="navbar-actions">
      <app-language-selector></app-language-selector>
      <a routerLink="/sandbox">
        <p-button [label]="'navbar.demoLive' | translate" icon="pi pi-play" size="small" severity="secondary" [outlined]="true" />
      </a>
      <a routerLink="/downloads">
        <p-button [label]="'navbar.download' | translate" icon="pi pi-download" size="small" />
      </a>
    </div>
  </div>
</nav>
