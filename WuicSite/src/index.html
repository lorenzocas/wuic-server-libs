  <!-- ─── Legacy hash-URL redirect (one-time, run before app boot) ──── -->
  <!-- Older shared links pointed to https://wuic-framework.com/#/pricing
       (when the app used HashLocationStrategy). After switching to path-based
       routing those links would land on the home page (the hash is ignored
       by Angular). This tiny inline script catches `/#/<path>` URLs at first
       page load and replaces the URL with the clean `/<path>` equivalent
       BEFORE Angular bootstraps. Bookmarks and external shares keep working. -->
  <script>
    (function(){
      var h = location.hash;
      if (h && h.length > 2 && h.charAt(1) === '/') {
        var clean = h.substring(1) + location.search;
        history.replaceState(null, '', clean);
      }
    })();
  </script>
